version: "2"

linters:
  enable:
    - gofmt
    - govet
    - errcheck
    - staticcheck
    - revive
    - misspell
    - unused
    - gosimple
    - ineffassign

linters-settings:
  revive:
    rules:
      - name: exported
        severity: warning

issues:
  max-same-issues: 0
  exclude-rules:
    - path: "_test\\.go"
      linters:
        - errcheck
